<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Manager Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="portal-nav">
        <button type="button" data-route="email" class="portal-nav-link is-active">Email</button>
        <button type="button" data-route="logs" class="portal-nav-link">Logs</button>
        <button type="button" data-route="settings" class="portal-nav-link">Settings</button>
    </nav>

    <main class="portal-main">
        <section id="view-email" data-view="email">
            <aside class="email-rail">
                <div class="rail-section">
                    <h3 class="rail-heading">Categories</h3>
                    <ul class="rail-list" id="categoryList">
                        <li><button type="button" class="rail-filter is-active" data-category="">All</button></li>
                        <li><button type="button" class="rail-filter" data-category="Needs Reply">Needs Reply <span class="rail-count" id="count-cat-needs-reply"></span></button></li>
                        <li><button type="button" class="rail-filter" data-category="Waiting on Others">Waiting on Others <span class="rail-count" id="count-cat-waiting"></span></button></li>
                        <li><button type="button" class="rail-filter" data-category="FYI">FYI <span class="rail-count" id="count-cat-fyi"></span></button></li>
                    </ul>
                </div>
                <div class="rail-section">
                    <h3 class="rail-heading">State</h3>
                    <ul class="rail-list" id="stateList">
                        <li><button type="button" class="rail-filter is-active" data-state="">All</button></li>
                        <li><button type="button" class="rail-filter" data-state="Flagged">Flagged <span class="rail-count" id="count-state-flagged"></span></button></li>
                        <li><button type="button" class="rail-filter" data-state="Pinned">Pinned <span class="rail-count" id="count-state-pinned"></span></button></li>
                        <li><button type="button" class="rail-filter" data-state="Done">Done <span class="rail-count" id="count-state-done"></span></button></li>
                    </ul>
                </div>
                <div class="rail-section">
                    <h3 class="rail-heading">Tags</h3>
                    <ul class="rail-list" id="tagList">
                        <li><button type="button" class="rail-filter" data-tag="Approval">Approval <span class="rail-count" id="count-tag-approval"></span></button></li>
                        <li><button type="button" class="rail-filter" data-tag="Vendor">Vendor <span class="rail-count" id="count-tag-vendor"></span></button></li>
                        <li><button type="button" class="rail-filter" data-tag="Urgent">Urgent <span class="rail-count" id="count-tag-urgent"></span></button></li>
                    </ul>
                </div>
            </aside>

            <div class="email-main">
                <div class="email-toolbar">
                    <input type="search" id="emailSearch" placeholder="Search emails..." class="email-search-input">
                    <button type="button" id="triageRefreshBtn" class="btn btn-primary">Refresh</button>
                </div>
                <p id="triageStatus" class="triage-status"></p>
                <div id="triageList" class="email-list"></div>
                <div id="emailEmptyState" class="empty-state" hidden>No emails found.</div>
            </div>
        </section>

        <section id="view-logs" data-view="logs" hidden>
            <div class="controls">
                <div class="status">
                    <span>Status:</span>
                    <span id="connectionStatus" class="status-indicator disconnected">Disconnected</span>
                </div>
                <button id="clearEventsBtn" class="btn btn-danger">Clear Events</button>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Total Events:</span>
                    <span id="totalEvents" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Automation Events:</span>
                    <span id="automationCount" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">User Events:</span>
                    <span id="userCount" class="stat-value">0</span>
                </div>
            </div>
            <h2>Events Feed</h2>
            <div id="eventsList" class="events-list">
                <div class="empty-state">No events yet. Waiting for data...</div>
            </div>
        </section>

        <section id="view-settings" data-view="settings" hidden>
            <h2>Settings</h2>
            <form id="settingsForm" autocomplete="off">
                <div class="setting-group">
                    <label for="setting-provider">Email Provider</label>
                    <select id="setting-provider" name="emailProvider">
                        <option value="auto">Auto-detect</option>
                        <option value="chrome">Chrome (Outlook Web)</option>
                        <option value="graph">Microsoft Graph</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="setting-clientId">Graph Client ID</label>
                    <input id="setting-clientId" type="text" name="graphClientId" placeholder="Azure app client ID" spellcheck="false">
                </div>
                <div class="setting-group">
                    <label for="setting-tenantId">Graph Tenant ID</label>
                    <input id="setting-tenantId" type="text" name="graphTenantId" placeholder="organizations">
                </div>
                <div class="setting-group">
                    <label for="setting-minScore">Triage Threshold (%)</label>
                    <input id="setting-minScore" type="number" name="minScore" min="0" max="100">
                </div>
                <div class="setting-group">
                    <label for="setting-vipSenders">VIP Senders</label>
                    <textarea id="setting-vipSenders" name="vipSenders" rows="3" placeholder="ceo@, vp@, director@"></textarea>
                    <small>Comma-separated prefixes or addresses</small>
                </div>
                <button type="submit" class="btn btn-primary">Save</button>
                <div id="settingsSaveStatus" class="settings-save-status"></div>
            </form>
        </section>
    </main>

    <script src="portal-constants.js"></script>
    <script src="portal-state.js"></script>
    <script src="email-helpers.js"></script>
    <script src="log-helpers.js"></script>
    <script src="app.js"></script>
</body>
</html>
